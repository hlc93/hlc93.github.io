    <script>
      const header = document.querySelector('.site-header');
      header.classList.add('scrolled');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 0) {
          header.classList.add('scrolled');
        } else {

        }

    <script src="./js/site.js"></script>

    <script>
      (function() {
        const canvas = document.getElementById('cloud-canvas');
        const ctx = canvas.getContext('2d');
        let W = window.innerWidth, H = window.innerHeight;

        function resize() {
          W = window.innerWidth; H = window.innerHeight;
          canvas.width = Math.floor(W * devicePixelRatio);
          canvas.height = Math.floor(H * devicePixelRatio);
          canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
          ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        let mouse = { x: -999, y: -999 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY + window.scrollY; });
        window.addEventListener('blur', () => { mouse.x = -999; mouse.y = -999; });

        function makeCloud(randomPos) {
          const scale = 1.2 + Math.random() * 1.6;
          const blobCount = 7 + Math.floor(Math.random() * 5);
          const blobs = Array.from({length: blobCount}, (_, i) => ({
            ox: (i / blobCount - 0.5) * 120 * scale + (Math.random() - 0.5) * 30 * scale,
            oy: (Math.random() - 0.5) * 28 * scale,
            r: (20 + Math.random() * 30) * scale,
            dispX: 0, dispY: 0, dvx: 0, dvy: 0
          }));
          return {
            x: randomPos ? Math.random() * W : -300,
            y: 60 + Math.random() * (H - 120),
            vx: 0.06 + Math.random() * 0.1,
            vy: (Math.random() - 0.5) * 0.03,
            blobs, scale,
            alpha: randomPos ? (0.5 + Math.random() * 0.3) : 0,
            maxAlpha: 0.7 + Math.random() * 0.2,
            state: randomPos ? 'hold' : 'in',
            life: 0, maxLife: 800 + Math.random() * 600,
            dispersed: 0
          };
        }

        let clouds = Array.from({length: 8}, () => makeCloud(true));

        function drawCloud(c) {
          ctx.save();
          for (const b of c.blobs) {
            const bx = c.x + b.ox + b.dispX;
            const by = c.y + b.oy + b.dispY;
            const bAlpha = c.alpha * (1 - c.dispersed * 0.9);
            const bR = b.r * (1 + c.dispersed * 0.5);
            const g1 = ctx.createRadialGradient(bx, by, 0, bx, by, bR*1.3);
            g1.addColorStop(0, `rgba(255,255,255,${0.9 * (1 - c.dispersed * 0.8)})`);
            g1.addColorStop(0.5, `rgba(240,250,255,${0.6 * (1 - c.dispersed * 0.8)})`);
            g1.addColorStop(1, 'rgba(220,240,255,0)');
            ctx.globalAlpha = bAlpha;
            ctx.beginPath();
            ctx.arc(bx, by, bR*1.3, 0, Math.PI*2);
            ctx.fillStyle = g1; ctx.fill();
          }
          ctx.restore();
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);

          for (let i = clouds.length - 1; i >= 0; i--) {
            const c = clouds[i];
            const scrollY = window.scrollY;
            const screenY = c.y - scrollY;
            const cdx = c.x - mouse.x, cdy = c.y - mouse.y;
            const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
            const mouseNear = mouse.x !== -999 && cdist < 200;

            let totalDisp = 0;
            for (const b of c.blobs) {
              const bx = c.x + b.ox + b.dispX;
              const by = c.y + b.oy + b.dispY;
              const dx = bx - mouse.x, dy = by - mouse.y;
              const dist = Math.sqrt(dx*dx + dy*dy);
              if (mouseNear && dist < 160) {
                const force = (160 - dist) / 160 * 0.2;
                b.dvx += (dx/dist) * force;
                b.dvy += (dy/dist) * force;
              }
              b.dvx *= 0.93; b.dvy *= 0.93;
              b.dispX += b.dvx; b.dispY += b.dvy;
              if (!mouseNear) {
                b.dispX *= 0.992; b.dispY *= 0.992;
              }
              totalDisp += Math.sqrt(b.dispX*b.dispX + b.dispY*b.dispY);
            }

            const avgDisp = totalDisp / c.blobs.length;
            c.dispersed = Math.min(1, avgDisp / 80);

            c.x += c.vx; c.y += c.vy;
            if (c.x > W + 300) { clouds[i] = makeCloud(false); continue; }

            c.life++;
            if (c.state === 'in') {
              c.alpha += 0.0015;
              if (c.alpha >= c.maxAlpha) { c.alpha = c.maxAlpha; c.state = 'hold'; }
            } else if (c.state === 'hold') {
              if (c.life > c.maxLife) c.state = 'out';
            } else {
              c.alpha -= 0.0008;
              if (c.alpha <= 0) { clouds[i] = makeCloud(false); continue; }
            }

            // 只畫在 viewport 附近的雲
            ctx.save();
            ctx.translate(0, -scrollY);
            drawCloud(c);
            ctx.restore();
          }
          requestAnimationFrame(draw);
        }
        draw();
      })();
    </script>
