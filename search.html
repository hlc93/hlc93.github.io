<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>搜尋結果 | 陳宏霖</title>

    <style>
      body {
        background-color: #ffffff !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      * { margin: 0; padding: 0; border: 0; }

      html { scroll-behavior: smooth; }

      .site-header,
      .site-header.dark-bg {
        background-color: rgba(0,0,0,0.7) !important;
        background: rgba(0,0,0,0.7) !important;
        position: fixed;
        top: 0; left: 0; right: 0;
        width: 100%;
        z-index: 1000;
        margin: 0 !important;
        padding: 0 20px !important;
        border: none !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        height: 60px;
      }

      .site-header * {
        background-color: transparent !important;
        background: transparent !important;
      }

      .site-logo {
        color: #ffffff !important;
        font-weight: 800;
        font-size: 16px;
        display: flex;
        align-items: center;
        height: 60px;
        margin: 0 !important;
        padding: 0 !important;
        text-decoration: none !important;
      }

      .site-header .nav,
      .site-header .site-menu {
        display: flex !important;
        align-items: center;
        margin: 0 !important;
        padding: 0 !important;
        gap: 30px;
      }

      .site-header .nav-link,
      .site-header .site-header-toggle {
        color: #ffffff !important;
        background: transparent !important;
        display: flex;
        align-items: center;
        height: 60px;
        margin: 0 !important;
        padding: 0 !important;
        font-size: 14px;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .site-header .nav-link:hover { color: #cccccc !important; }

      #login-button-container {
        display: flex;
        align-items: center;
        height: 60px;
        margin: 0 !important;
        padding: 0 !important;
      }

      .authenticated-menu {
        display: flex;
        align-items: center;
        gap: 30px;
        height: 60px;
      }

      .admin-btn, .login-btn, .logout-link {
        color: #ffffff !important;
        background: none !important;
        border: none !important;
        cursor: pointer !important;
        font-size: 14px;
        text-decoration: none;
      }

      .site-header-toggle { display: none !important; }

      @media (max-width: 992px) {
        .site-header .site-menu { display: none !important; }
        .site-header-toggle { display: flex !important; }
      }

      @media (max-width: 992px) {
        .site-header .site-menu.is-open {
          background: rgba(0,0,0,0.9) !important;
        }
        .site-header .site-menu.is-open .nav-link,
        .site-header .site-menu.is-open .admin-btn,
        .site-header .site-menu.is-open .logout-link,
        .site-header .site-menu.is-open .login-btn {
          display: block !important;
          height: auto !important;
          min-height: unset !important;
          padding: 20px 24px !important;
          margin: 0 !important;
          box-sizing: border-box !important;
          border: none !important;
          color: #ffffff !important;
          font-size: 13px !important;
        }
        .site-header .site-menu.is-open #login-button-container,
        .site-header .site-menu.is-open .authenticated-menu {
          display: block !important;
          height: auto !important;
          min-height: unset !important;
          padding: 0 !important;
          margin: 0 !important;
          gap: 0 !important;
        }
      }

      .site-main {
        margin-top: 60px;
        padding: 60px 20px;
        min-height: calc(100vh - 120px);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .search-header {
        margin-bottom: 40px;
      }

      .search-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 20px;
      }

      .search-bar {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .search-input {
        flex: 1;
        padding: 12px 16px !important;
        border: 2px solid #e0e0e0 !important;
        border-radius: 8px !important;
        font-size: 16px !important;
        color: #1a1a1a !important;
        outline: none;
        box-sizing: border-box !important;
        min-height: unset !important;
        height: auto !important;
        transition: border-color 0.3s ease;
      }

      .search-input:focus {
        border-color: #1a1a1a !important;
      }

      .search-btn {
        padding: 12px 24px !important;
        background: #1a1a1a !important;
        color: #ffffff !important;
        border: none !important;
        border-radius: 8px !important;
        font-size: 15px !important;
        font-weight: 600;
        cursor: pointer !important;
        min-height: unset !important;
        height: auto !important;
        transition: background 0.3s ease;
      }

      .search-btn:hover {
        background: #333333 !important;
      }

      .results-count {
        font-size: 14px;
        color: #888;
        margin-bottom: 24px;
      }

      .result-card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 8px;
        padding: 24px;
        margin-bottom: 16px;
        text-decoration: none;
        display: block;
        transition: all 0.2s ease;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      }

      .result-card:hover {
        border-color: #1a1a1a;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        transform: translateY(-1px);
      }

      .result-category {
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .result-title {
        font-size: 18px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 6px;
      }

      .result-desc {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 10px;
      }

      .result-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .result-tag {
        font-size: 11px;
        color: #888;
        background: #f5f5f5;
        padding: 3px 8px;
        border-radius: 12px;
      }

      .result-tag.highlight {
        background: #1a1a1a;
        color: #fff;
      }

      .no-results {
        text-align: center;
        padding: 80px 20px;
        color: #aaa;
      }

      .no-results p:first-child {
        font-size: 40px;
        margin-bottom: 16px;
      }

      .no-results p:last-child {
        font-size: 16px;
      }

      .site-footer {
        background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.7) 100%);
        color: #888;
        text-align: center;
        padding: 30px 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>

        <a class="nav-link" href="./performance-records.html">表演紀錄</a>
        <a class="nav-link" href="./projects.html">專題紀錄</a>
        <div id="login-button-container"></div>
      </nav>
    </header>

    <div class="site-main">
      <div class="container">
        <div class="search-header">
          <h1>搜尋</h1>
          <div class="search-bar">
            <input class="search-input" id="searchInput" placeholder="輸入曲名、媒材、年份、關鍵字…" type="text" />
            <button class="search-btn" onclick="doSearch()">搜尋</button>
          </div>
        </div>

        <div id="resultsCount" class="results-count" style="display:none;"></div>
        <div id="results"></div>
        <div class="no-results" id="noResults" style="display:none;">
          <p>🔍</p>
          <p>找不到符合的結果，試試其他關鍵字</p>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>&copy; 2026 HONGLIN CHEN. All rights reserved.</p>
    </footer>

          tags: ['TouchDesigner', '錄像', '錯誤', '練琴', '聲音', 'Rehearsal', '練習曲', '失誤'],
          searchOnly: ['td']

      ];

      function doSearch() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultsDiv = document.getElementById('results');
        const countDiv = document.getElementById('resultsCount');
        const noResults = document.getElementById('noResults');

        if (!q) {
          resultsDiv.innerHTML = '';
          countDiv.style.display = 'none';
          noResults.style.display = 'none';
          return;
        }

        const matched = DATABASE.filter(item => {
          const searchOnly = item.searchOnly || [];
          const searchText = [item.title, item.category, item.desc, ...item.tags, ...searchOnly].join(' ').toLowerCase();
          return searchText.includes(q);
        });

        resultsDiv.innerHTML = '';
        noResults.style.display = 'none';

        if (matched.length === 0) {
          countDiv.style.display = 'none';
          noResults.style.display = 'block';
          return;
        }

        countDiv.style.display = 'block';
        countDiv.textContent = `找到 ${matched.length} 筆結果`;

        matched.forEach(item => {
          const card = document.createElement('a');
          card.className = 'result-card';
          card.href = item.url;

          const highlightedTags = item.tags.map(tag => {
            const isMatch = tag.toLowerCase().includes(q);
            return `<span class="result-tag${isMatch ? ' highlight' : ''}">${tag}</span>`;
          }).join('');

          card.innerHTML = `
            <div class="result-category">${item.category}</div>
            <div class="result-title">${item.title}</div>
            <div class="result-desc">${item.desc}</div>
            <div class="result-tags">${highlightedTags}</div>
          `;
          resultsDiv.appendChild(card);
        });
      }

      // Enter 鍵觸發搜尋
      document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('searchInput');
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') doSearch();
        });

        // 從首頁帶過來的搜尋詞
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) {
          input.value = q;
          doSearch();
        }
      });
    </script>
    <script src="./js/site.js"></script>
  </body>
</html>
